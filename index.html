<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevvex - Animierte Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="fade-in">Willkommen bei Sevvex</h1>
        <p class="fade-in delay-1">Entdecke beeindruckende Animationen</p>
    </header>
    <main>
        <section class="animation-section">
            <div class="box bounce"></div>
            <div class="box slide-in-left"></div>
            <div class="box rotate"></div>
            <div class="box zoom-in"></div>
        </section>
    </main>
    <footer>
        <p class="fade-in delay-2">&copy; 2024 Sevvex. Alle Rechte vorbehalten.</p>
    </footer>
</body>
</html>
